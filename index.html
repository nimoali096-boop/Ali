<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhamed Chomani | Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #080808;
            background-image: radial-gradient(circle at 50% -20%, #2c2412 0%, #080808 80%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .welcome-text {
            color: #d4af37;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.8;
            font-weight: 400;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 40px;
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: #d4af37;
            box-shadow: 0 0 10px #d4af37;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 65vh;
            overflow-y: auto;
            padding: 10px;
        }

        /* ستایلی Scrollbar بۆ ئەوەی جوان بێت */
        .links-stack::-webkit-scrollbar { width: 3px; }
        .links-stack::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }

        .glass-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 15px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
        }

        .glass-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .icon-circle {
            width: 35px;
            height: 35px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 15px;
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-tiktok { color: #ffffff; }
        .fa-snapchat-ghost { color: #FFFC00; }

        .glass-btn span {
            flex-grow: 1;
            text-align: right;
            font-size: 14px;
            font-weight: 500;
        }

        .fa-external-link-alt {
            font-size: 10px;
            opacity: 0.3;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="welcome-text">Welcome to my profile</p>
        <h1>MUHAMED CHOMANI</h1>

        <div class="links-stack">
            <a href="https://wa.me/9647500000000" target="_blank" class="glass-btn">
                <div class="icon-circle"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="https://www.instagram.com/hama_l289" target="_blank" class="glass-btn">
                <div class="icon-circle"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="https://www.tiktok.com/@muhamad_chomani89" target="_blank" class="glass-btn">
                <div class="icon-circle"><i class="fab fa-tiktok"></i></div>
                <span>TikTok (Personal)</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="https://www.tiktok.com/@aqarat_dashti_ali" target="_blank" class="glass-btn">
                <div class="icon-circle"><i class="fab fa-tiktok"></i></div>
                <span>TikTok (Aqarat)</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="https://www.snapchat.com/add/hama_l289" target="_blank" class="glass-btn">
                <div class="icon-circle"><i class="fab fa-snapchat-ghost"></i></div>
                <span>Snapchat</span>
                <i class="fas fa-external-link-alt"></i>
            </a>
        </div>
    </div>

</body>
</html>
